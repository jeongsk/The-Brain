services:
  the-brain:
    build:
      context: .
      dockerfile: Dockerfile.thebrain
    container_name: the_brain
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Active engine provider
      # Options: ollama, openai, vllm, lmstudio, llamacpp
      - LLM_ENGINE=${LLM_ENGINE:-openai}

      # Provider URLs
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - LM_STUDIO_BASE_URL=${LM_STUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:8000/v1}
      - LLAMA_CPP_BASE_URL=${LLAMA_CPP_BASE_URL:-http://host.docker.internal:8080/v1}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}

      # API key
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-local-test-key}

      # Models
      - LLM_MODEL=${LLM_MODEL:-gpt-5.4-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - VISION_MODEL=${VISION_MODEL:-gpt-5.4-mini}

      # Reranker config
      - RERANKER_BASE_URL=${RERANKER_BASE_URL:-}
      - RERANKER_MODEL=${RERANKER_MODEL:-}

      # Model Settings & Tuning
      - LLM_NUM_CTX=${LLM_NUM_CTX:-32768}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-7200}
      - LLM_MAX_ASYNC=${LLM_MAX_ASYNC:-1}

      - EMBEDDING_DIM=${EMBEDDING_DIM:-4096}
      - MAX_EMBED_TOKENS=${MAX_EMBED_TOKENS:-8192}
      - EMBEDDING_TIMEOUT=${EMBEDDING_TIMEOUT:-300}
      - EMBEDDING_MAX_ASYNC=${EMBEDDING_MAX_ASYNC:-1}

      # Document Chunking
      - CHUNK_SIZE=${CHUNK_SIZE:-600}
      - CHUNK_OVERLAP_SIZE=${CHUNK_OVERLAP_SIZE:-100}

      # Neo4j
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}

      # Internal paths (mapped to volume)
      - WORKING_DIR=${WORKING_DIR:-/app/data/rag_storage}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/data/uploads}
      - OUTPUT_DIR=${OUTPUT_DIR:-/app/data/output}
      - PARSER=${PARSER:-mineru}
    ports:
      - "8100:8100"
    volumes:
      - thebrain_data:/app/data
      - thebrain_mineru_models:/root/.cache/huggingface
    networks:
      - brain_net
    depends_on:
      neo4j:
        condition: service_healthy

  # Neo4j
  neo4j:
    image: neo4j:5.26.0
    container_name: lightrag_neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    networks:
      - brain_net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  brain_net:

volumes:
  neo4j_data:
    name: lightrag_neo4j_data
  neo4j_plugins:
    name: lightrag_neo4j_plugins
  thebrain_data:
    name: thebrain_data
  thebrain_mineru_models:
    name: thebrain_mineru_models
